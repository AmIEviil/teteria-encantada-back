name: Deploy backend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  IMAGE: gonzaduoc/teteria-encantada-back

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on VPS via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SERVER_USER }}
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          remote="cd \"$DEPLOY_PATH\" && docker-compose -f docker-compose.yml pull backend && docker-compose -f docker-compose.yml up -d backend && docker image prune -f"
          for i in 1 2 3 4 5; do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "$remote"; then
              echo "deploy OK"; exit 0
            fi
            echo "intento $i fallo; reintento en 20s"; sleep 20
          done
          echo "deploy fallo tras 5 intentos"; exit 1
